name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build web
        run: cd web && npm ci && npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images (multi-arch)
        run: |
          TAG=${GITHUB_REF_NAME}
          docker buildx build --platform linux/amd64,linux/arm64 --push \
            -t ghcr.io/kevincornellius/tcforge-builder:$TAG \
            -t ghcr.io/kevincornellius/tcforge-builder:latest \
            ./docker/builder
          docker buildx build --platform linux/amd64,linux/arm64 --push \
            --build-arg VERSION=$TAG \
            -t ghcr.io/kevincornellius/tcforge-api:$TAG \
            -t ghcr.io/kevincornellius/tcforge-api:latest \
            -f api/Dockerfile .
          docker buildx build --platform linux/amd64,linux/arm64 --push \
            -t ghcr.io/kevincornellius/tcforge-judge:$TAG \
            -t ghcr.io/kevincornellius/tcforge-judge:latest \
            -f judge/Dockerfile .

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
